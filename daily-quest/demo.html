<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Quest — 試用 Demo</title>
    <meta name="theme-color" content="#0f0f0f">
    <link rel="icon" type="image/svg+xml" href="./icon.svg">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div id="demo-banner" class="demo-banner">
        <span class="demo-banner-text">🧪 試用模式 · 資料僅存在本分頁，關掉即消失</span>
        <button id="demo-reset" class="ghost">重置試用資料</button>
        <a class="ghost-link" href="./index.html">離開試用 →</a>
    </div>

    <header>
        <h1>Daily Quest</h1>
        <p id="today-date">—</p>
    </header>

    <main>
        <section id="loading" class="card loading hidden">
            <p>載入中…</p>
        </section>

        <div id="main-view" class="hidden">
            <nav class="tabs" role="tablist">
                <button class="tab active" data-tab="today" role="tab">今日</button>
                <button class="tab" data-tab="history" role="tab">歷史</button>
                <button class="tab" data-tab="stats" role="tab">成就</button>
            </nav>

            <div id="tab-today" class="tab-panel">
                <section id="status-bar" class="status-bar"></section>
                <section id="today-section" class="card">
                    <div class="card-header">
                        <h2>今日任務</h2>
                        <span id="today-progress" class="progress-badge">0 / 0</span>
                    </div>
                    <ul id="task-list" class="task-list"></ul>
                </section>
            </div>

            <div id="tab-history" class="tab-panel hidden">
                <section class="card">
                    <div class="card-header">
                        <h2>近期統計</h2>
                    </div>
                    <div id="stats-grid" class="stats-grid"></div>
                </section>

                <section class="card">
                    <div class="card-header">
                        <h2>熱力圖</h2>
                        <span class="muted">近 26 週</span>
                    </div>
                    <div id="heatmap-wrap">
                        <div id="heatmap" class="heatmap-grid"></div>
                        <div class="heatmap-legend">
                            <span class="muted">少</span>
                            <span class="heatmap-cell lvl-0"></span>
                            <span class="heatmap-cell lvl-1"></span>
                            <span class="heatmap-cell lvl-2"></span>
                            <span class="heatmap-cell lvl-3"></span>
                            <span class="heatmap-cell lvl-4"></span>
                            <span class="muted">多</span>
                        </div>
                    </div>
                </section>

                <section class="card">
                    <div class="card-header">
                        <h2>單任務歷史</h2>
                        <select id="task-select" class="task-select"></select>
                    </div>
                    <div id="task-history-chart" class="task-history-chart"></div>
                </section>

                <section class="card">
                    <div class="card-header">
                        <h2>過往紀錄</h2>
                        <span class="muted" id="history-range"></span>
                    </div>
                    <div id="history-table" class="history-table"></div>
                </section>
            </div>

            <div id="tab-stats" class="tab-panel hidden">
                <section class="card">
                    <div class="card-header">
                        <h2>我的角色</h2>
                    </div>
                    <div id="character-card" class="character-card"></div>
                </section>

                <section id="challenge-card" class="card hidden">
                    <div class="card-header">
                        <h2 id="challenge-title">75 Hard 挑戰</h2>
                        <span id="challenge-badge" class="progress-badge"></span>
                    </div>
                    <div id="challenge-body"></div>
                </section>

                <section class="card">
                    <div class="card-header">
                        <h2>成就</h2>
                        <span id="achievements-count" class="muted"></span>
                    </div>
                    <div id="achievements-grid" class="achievements-grid"></div>
                </section>
            </div>
        </div>

        <section id="footer-actions" class="footer-actions hidden">
            <button id="refresh" class="ghost">重新整理</button>
            <button id="open-settings" class="ghost">設定</button>
        </section>

        <section id="error-box" class="card error-box hidden">
            <h2>發生錯誤</h2>
            <p id="error-msg"></p>
            <button id="error-retry" class="primary">重試</button>
        </section>

        <div id="settings-modal" class="modal hidden">
            <div class="modal-backdrop"></div>
            <div class="modal-dialog card">
                <div class="card-header">
                    <h2>設定</h2>
                    <button class="icon-btn" id="close-settings">✕</button>
                </div>
                <div id="settings-body"></div>
            </div>
        </div>

        <div id="celebrate" class="celebrate hidden" aria-hidden="true"></div>
    </main>

    <footer>
        <p>Demo · <a href="../">← 回 Playground</a></p>
    </footer>

    <script src="./demo.js"></script>
    <script src="./js/util.js"></script>
    <script src="./js/state.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/game.js"></script>
    <script src="./js/render-today.js"></script>
    <script src="./js/render-history.js"></script>
    <script src="./js/render-stats.js"></script>
    <script src="./js/settings.js"></script>
    <script src="./js/app.js"></script>
    <script>
        document.getElementById('demo-reset').addEventListener('click', () => window.resetDemoState());
    </script>
</body>
</html>
