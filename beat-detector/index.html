<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BPM 節拍偵測器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            padding: 1.5rem 1rem 0.5rem;
            text-align: center;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.05em;
        }

        header p {
            font-size: 0.85rem;
            color: #666;
            margin-top: 0.25rem;
        }

        .mode-switcher {
            display: flex;
            gap: 0;
            margin: 1rem auto;
            background: #1a1a24;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a3a;
            width: fit-content;
        }

        .mode-btn {
            padding: 0.6rem 1.4rem;
            border: none;
            background: transparent;
            color: #888;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .mode-btn.active {
            background: #2a2a4a;
            color: #fff;
        }

        /* BPM Display */
        .bpm-display {
            text-align: center;
            padding: 2rem 1rem;
            position: relative;
        }

        .bpm-ring {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 3px solid #2a2a3a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            transition: border-color 0.1s, box-shadow 0.1s;
            position: relative;
        }

        .bpm-ring.pulse {
            border-color: #6c5ce7;
            box-shadow: 0 0 30px rgba(108, 92, 231, 0.3);
        }

        .bpm-number {
            font-size: 4rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .bpm-label {
            font-size: 1rem;
            color: #888;
            margin-top: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .bpm-sub {
            font-size: 0.85rem;
            color: #555;
            margin-top: 1rem;
            text-align: center;
        }

        /* Canvas visualizer */
        .visualizer-container {
            width: 100%;
            max-width: 500px;
            padding: 0 1rem;
            margin: 0.5rem auto;
        }

        #visualizer {
            width: 100%;
            height: 100px;
            border-radius: 12px;
            background: #12121a;
        }

        /* Tap area */
        .tap-area {
            width: 100%;
            max-width: 500px;
            padding: 0 1rem;
            margin: 1rem auto;
            display: none;
        }

        .tap-area.active {
            display: block;
        }

        .tap-button {
            width: 100%;
            height: 180px;
            border-radius: 16px;
            border: 2px dashed #2a2a3a;
            background: #12121a;
            color: #888;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            user-select: none;
            -webkit-user-select: none;
        }

        .tap-button:active {
            background: #1a1a2e;
            border-color: #6c5ce7;
            transform: scale(0.98);
        }

        .tap-icon {
            font-size: 2rem;
            opacity: 0.5;
        }

        .tap-hint {
            font-size: 0.8rem;
            color: #555;
        }

        /* Mic area */
        .mic-area {
            width: 100%;
            max-width: 500px;
            padding: 0 1rem;
            margin: 1rem auto;
            text-align: center;
            display: none;
        }

        .mic-area.active {
            display: block;
        }

        .mic-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #2a2a3a;
            background: #12121a;
            color: #888;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .mic-button.listening {
            border-color: #e74c3c;
            background: #1a1215;
            animation: mic-glow 1.5s ease-in-out infinite;
        }

        @keyframes mic-glow {
            0%, 100% { box-shadow: 0 0 10px rgba(231, 76, 60, 0.2); }
            50% { box-shadow: 0 0 25px rgba(231, 76, 60, 0.4); }
        }

        .mic-status {
            margin-top: 0.75rem;
            font-size: 0.85rem;
            color: #666;
        }

        .sensitivity-control {
            width: 100%;
            max-width: 500px;
            padding: 0 1rem;
            margin: 0.5rem auto;
            display: none;
        }

        .sensitivity-control.active {
            display: block;
        }

        .sensitivity-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 0.3rem;
        }

        .sensitivity-slider {
            width: 100%;
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            border-radius: 3px;
            background: #2a2a3a;
            outline: none;
        }

        .sensitivity-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #6c5ce7;
            cursor: pointer;
        }

        .debug-info {
            font-size: 0.7rem;
            color: #444;
            text-align: center;
            margin-top: 0.4rem;
            font-variant-numeric: tabular-nums;
            font-family: monospace;
        }

        /* History */
        .history {
            width: 100%;
            max-width: 500px;
            padding: 1rem;
            margin-top: auto;
        }

        .history-title {
            font-size: 0.8rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .history-items {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .history-item {
            padding: 0.3rem 0.7rem;
            background: #1a1a24;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #aaa;
            font-variant-numeric: tabular-nums;
        }

        .reset-btn {
            display: inline-block;
            margin-top: 0.75rem;
            padding: 0.3rem 0.8rem;
            background: transparent;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            color: #666;
            font-size: 0.8rem;
            cursor: pointer;
            font-family: inherit;
        }

        .reset-btn:active {
            background: #1a1a24;
        }

        .back-link {
            display: inline-block;
            margin: 1.5rem 0;
            color: #555;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .back-link:hover {
            color: #888;
        }
    </style>
</head>
<body>
    <header>
        <h1>BPM 節拍偵測器</h1>
        <p>偵測音樂節拍速度</p>
    </header>

    <div class="mode-switcher">
        <button class="mode-btn active" data-mode="tap">手動 Tap</button>
        <button class="mode-btn" data-mode="mic">麥克風偵測</button>
    </div>

    <div class="bpm-display">
        <div class="bpm-ring" id="bpmRing">
            <span class="bpm-number" id="bpmNumber">—</span>
            <span class="bpm-label">BPM</span>
        </div>
        <div class="bpm-sub" id="bpmSub"></div>
    </div>

    <div class="visualizer-container">
        <canvas id="visualizer"></canvas>
    </div>

    <!-- Tap Mode -->
    <div class="tap-area active" id="tapArea">
        <button class="tap-button" id="tapButton">
            <span class="tap-icon">👆</span>
            <span>跟著節拍點擊</span>
            <span class="tap-hint">連續點擊至少 4 下</span>
        </button>
    </div>

    <!-- Mic Mode -->
    <div class="mic-area" id="micArea">
        <button class="mic-button" id="micButton">🎤</button>
        <div class="mic-status" id="micStatus">點擊開始偵測</div>
    </div>

    <!-- Sensitivity -->
    <div class="sensitivity-control" id="sensitivityControl">
        <div class="sensitivity-label">
            <span>靈敏度</span>
            <span id="sensitivityValue">中</span>
        </div>
        <input type="range" class="sensitivity-slider" id="sensitivitySlider" min="1" max="10" value="5" step="1">
        <div class="debug-info" id="debugInfo"></div>
    </div>

    <!-- History -->
    <div class="history" id="historySection" style="display:none;">
        <div class="history-title">偵測紀錄</div>
        <div class="history-items" id="historyItems"></div>
        <button class="reset-btn" id="resetBtn">清除紀錄</button>
    </div>

    <a href="../" class="back-link">← 返回首頁</a>

    <script>
    (() => {
        // --- State ---
        const state = {
            mode: 'tap',
            tapTimes: [],
            tapTimeout: null,
            bpm: 0,
            history: [],
            // Mic
            audioCtx: null,
            analyser: null,
            micStream: null,
            listening: false,
            // Beat detection
            energyHistory: [],
            beatTimes: [],
            animFrameId: null,
        };

        // --- DOM ---
        const $ = (sel) => document.querySelector(sel);
        const bpmNumber = $('#bpmNumber');
        const bpmRing = $('#bpmRing');
        const bpmSub = $('#bpmSub');
        const tapArea = $('#tapArea');
        const tapButton = $('#tapButton');
        const micArea = $('#micArea');
        const micButton = $('#micButton');
        const micStatus = $('#micStatus');
        const historySection = $('#historySection');
        const historyItems = $('#historyItems');
        const resetBtn = $('#resetBtn');
        const canvas = $('#visualizer');
        const ctx = canvas.getContext('2d');

        // --- Canvas resize ---
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width * devicePixelRatio;
            canvas.height = 100 * devicePixelRatio;
            ctx.scale(devicePixelRatio, devicePixelRatio);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const sensitivityControl = $('#sensitivityControl');
        const sensitivitySlider = $('#sensitivitySlider');
        const sensitivityValue = $('#sensitivityValue');
        const debugInfo = $('#debugInfo');

        // --- Mode Switching ---
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.mode = btn.dataset.mode;

                tapArea.classList.toggle('active', state.mode === 'tap');
                micArea.classList.toggle('active', state.mode === 'mic');
                sensitivityControl.classList.toggle('active', state.mode === 'mic');

                // Stop mic if switching away
                if (state.mode === 'tap' && state.listening) {
                    stopMic();
                }
            });
        });

        // --- Sensitivity ---
        const sensitivityLabels = ['', '極高', '很高', '高', '中高', '中', '中低', '低', '很低', '極低', '最低'];
        sensitivitySlider.addEventListener('input', () => {
            sensitivityValue.textContent = sensitivityLabels[parseInt(sensitivitySlider.value)];
        });

        // --- Display ---
        function updateBpmDisplay(bpm, sub) {
            state.bpm = bpm;
            bpmNumber.textContent = bpm > 0 ? Math.round(bpm) : '—';
            bpmSub.textContent = sub || '';
            pulseRing();
        }

        function pulseRing() {
            bpmRing.classList.add('pulse');
            setTimeout(() => bpmRing.classList.remove('pulse'), 150);
        }

        function addHistory(bpm) {
            if (bpm <= 0) return;
            const rounded = Math.round(bpm);
            state.history.unshift(rounded);
            if (state.history.length > 10) state.history.pop();
            renderHistory();
        }

        function renderHistory() {
            if (state.history.length === 0) {
                historySection.style.display = 'none';
                return;
            }
            historySection.style.display = 'block';
            historyItems.innerHTML = state.history
                .map(b => `<span class="history-item">${b} BPM</span>`)
                .join('');
        }

        resetBtn.addEventListener('click', () => {
            state.history = [];
            state.tapTimes = [];
            updateBpmDisplay(0, '');
            renderHistory();
        });

        // =====================
        //     TAP TEMPO
        // =====================
        tapButton.addEventListener('click', onTap);
        tapButton.addEventListener('touchstart', (e) => {
            e.preventDefault();
            onTap();
        });

        function onTap() {
            const now = performance.now();

            // Reset if too long since last tap (>2 seconds)
            if (state.tapTimes.length > 0 && now - state.tapTimes[state.tapTimes.length - 1] > 2000) {
                // Save previous result before resetting
                if (state.bpm > 0) {
                    addHistory(state.bpm);
                }
                state.tapTimes = [];
            }

            state.tapTimes.push(now);

            // Keep last 20 taps
            if (state.tapTimes.length > 20) {
                state.tapTimes.shift();
            }

            pulseRing();
            drawTapVisual();

            if (state.tapTimes.length < 2) {
                updateBpmDisplay(0, '繼續點擊...');
                return;
            }

            // Calculate BPM from intervals
            const intervals = [];
            for (let i = 1; i < state.tapTimes.length; i++) {
                intervals.push(state.tapTimes[i] - state.tapTimes[i - 1]);
            }
            const avgInterval = intervals.reduce((a, b) => a + b, 0) / intervals.length;
            const bpm = 60000 / avgInterval;

            const count = state.tapTimes.length;
            updateBpmDisplay(bpm, `${count} 次點擊`);

            // Auto-save after 3 seconds of no tap
            clearTimeout(state.tapTimeout);
            state.tapTimeout = setTimeout(() => {
                if (state.bpm > 0) {
                    addHistory(state.bpm);
                }
            }, 3000);
        }

        function drawTapVisual() {
            const w = canvas.width / devicePixelRatio;
            const h = canvas.height / devicePixelRatio;
            ctx.clearRect(0, 0, w, h);

            if (state.tapTimes.length < 2) return;

            const intervals = [];
            for (let i = 1; i < state.tapTimes.length; i++) {
                intervals.push(state.tapTimes[i] - state.tapTimes[i - 1]);
            }

            const maxInterval = Math.max(...intervals);
            const barWidth = Math.max(4, (w - 20) / intervals.length - 2);

            intervals.forEach((interval, i) => {
                const barHeight = (interval / maxInterval) * (h - 20);
                const x = 10 + i * (barWidth + 2);
                const y = h - 10 - barHeight;

                const hue = 260 - (interval / maxInterval) * 40;
                ctx.fillStyle = `hsla(${hue}, 60%, 60%, 0.8)`;
                ctx.beginPath();
                ctx.roundRect(x, y, barWidth, barHeight, 2);
                ctx.fill();
            });
        }

        // =====================
        //    MICROPHONE BEAT
        // =====================
        micButton.addEventListener('click', toggleMic);

        async function toggleMic() {
            if (state.listening) {
                stopMic();
            } else {
                await startMic();
            }
        }

        async function startMic() {
            try {
                state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                state.micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

                const source = state.audioCtx.createMediaStreamSource(state.micStream);
                state.analyser = state.audioCtx.createAnalyser();
                state.analyser.fftSize = 1024;
                state.analyser.smoothingTimeConstant = 0.3;
                source.connect(state.analyser);

                state.listening = true;
                state.energyHistory = [];
                state.beatTimes = [];

                micButton.classList.add('listening');
                micStatus.textContent = '偵測中...';

                detectBeats();
            } catch (err) {
                micStatus.textContent = '無法存取麥克風';
                console.error(err);
            }
        }

        function stopMic() {
            state.listening = false;
            if (state.micStream) {
                state.micStream.getTracks().forEach(t => t.stop());
                state.micStream = null;
            }
            if (state.audioCtx) {
                state.audioCtx.close();
                state.audioCtx = null;
            }
            if (state.animFrameId) {
                cancelAnimationFrame(state.animFrameId);
                state.animFrameId = null;
            }

            micButton.classList.remove('listening');
            micStatus.textContent = '點擊開始偵測';

            if (state.bpm > 0) {
                addHistory(state.bpm);
            }
        }

        function detectBeats() {
            if (!state.listening) return;

            const analyser = state.analyser;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            const binHz = state.audioCtx.sampleRate / analyser.fftSize;

            // Use wider frequency range: 60-500Hz (bass + low-mid)
            // Phone speakers/mic often miss deep bass, so include more range
            const lowBin = Math.floor(60 / binHz);
            const highBin = Math.ceil(500 / binHz);
            let energy = 0;
            for (let i = lowBin; i < highBin && i < bufferLength; i++) {
                energy += dataArray[i] * dataArray[i];
            }
            energy = Math.sqrt(energy / (highBin - lowBin));

            // Keep energy history (~1.5 seconds)
            state.energyHistory.push(energy);
            const historySize = 90;
            if (state.energyHistory.length > historySize) {
                state.energyHistory.shift();
            }

            // Sensitivity: slider 1 (most sensitive) to 10 (least sensitive)
            // Maps to threshold multiplier 1.1 to 2.0
            const sens = parseInt(sensitivitySlider.value);
            const thresholdMultiplier = 1.0 + sens * 0.1;

            // Calculate average energy (exclude top 10% to avoid peaks skewing average)
            const sorted = [...state.energyHistory].sort((a, b) => a - b);
            const trimCount = Math.floor(sorted.length * 0.9);
            const trimmed = sorted.slice(0, trimCount);
            const avg = trimmed.length > 0 ? trimmed.reduce((a, b) => a + b, 0) / trimmed.length : 0;
            const threshold = avg * thresholdMultiplier;

            // Minimum energy floor: very low (3) to allow quiet environments
            const minEnergy = 3;
            const now = performance.now();

            // Min interval between beats: 200ms = max 300 BPM
            const minBeatInterval = 200;
            const lastBeat = state.beatTimes.length > 0 ? state.beatTimes[state.beatTimes.length - 1] : 0;

            const isBeat = energy > threshold && energy > minEnergy && (now - lastBeat) > minBeatInterval;

            // Debug info
            debugInfo.textContent = `能量: ${energy.toFixed(1)} | 閾值: ${threshold.toFixed(1)} | 倍率: ${thresholdMultiplier.toFixed(1)}x | 節拍數: ${state.beatTimes.length}`;

            if (isBeat) {
                state.beatTimes.push(now);
                pulseRing();

                // Keep only recent beats (last 8 seconds)
                const cutoff = now - 8000;
                state.beatTimes = state.beatTimes.filter(t => t > cutoff);

                // Calculate BPM from beat intervals (need at least 2 beats = 1 interval)
                if (state.beatTimes.length >= 2) {
                    const intervals = [];
                    for (let i = 1; i < state.beatTimes.length; i++) {
                        intervals.push(state.beatTimes[i] - state.beatTimes[i - 1]);
                    }

                    let finalIntervals = intervals;

                    // Only apply outlier filtering if we have enough data
                    if (intervals.length >= 4) {
                        const sortedIntervals = [...intervals].sort((a, b) => a - b);
                        const median = sortedIntervals[Math.floor(sortedIntervals.length / 2)];
                        finalIntervals = intervals.filter(v => v > median * 0.4 && v < median * 1.6);
                    }

                    if (finalIntervals.length >= 1) {
                        const avgInterval = finalIntervals.reduce((a, b) => a + b, 0) / finalIntervals.length;
                        const bpm = 60000 / avgInterval;
                        if (bpm >= 30 && bpm <= 300) {
                            updateBpmDisplay(bpm, `偵測到 ${state.beatTimes.length} 個節拍`);
                        }
                    }
                }
            }

            // Draw visualizer
            drawMicVisual(dataArray, bufferLength, energy, threshold);

            state.animFrameId = requestAnimationFrame(detectBeats);
        }

        function drawMicVisual(dataArray, bufferLength, currentEnergy, threshold) {
            const w = canvas.width / devicePixelRatio;
            const h = canvas.height / devicePixelRatio;
            ctx.clearRect(0, 0, w, h);

            // Draw frequency bars
            const barCount = 64;
            const step = Math.floor(bufferLength / barCount);
            const barWidth = (w - 20) / barCount - 1;

            for (let i = 0; i < barCount; i++) {
                const value = dataArray[i * step] / 255;
                const barHeight = value * (h - 20);
                const x = 10 + i * (barWidth + 1);
                const y = h - 10 - barHeight;

                // Color: purple for bass, blue for mid, teal for high
                const hue = 260 - (i / barCount) * 80;
                const lightness = 40 + value * 25;
                ctx.fillStyle = `hsla(${hue}, 60%, ${lightness}%, 0.85)`;
                ctx.beginPath();
                ctx.roundRect(x, y, barWidth, barHeight, 1);
                ctx.fill();
            }

            // Threshold line
            if (state.energyHistory.length > 0) {
                const maxEnergy = Math.max(...state.energyHistory, 1);
                const threshY = h - 10 - (threshold / maxEnergy) * (h - 20);
                ctx.strokeStyle = 'rgba(108, 92, 231, 0.3)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.moveTo(10, Math.max(threshY, 10));
                ctx.lineTo(w - 10, Math.max(threshY, 10));
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        // --- Canvas roundRect polyfill for older browsers ---
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                this.closePath();
            };
        }

        // Draw idle state
        function drawIdle() {
            const w = canvas.width / devicePixelRatio;
            const h = canvas.height / devicePixelRatio;
            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = '#333';
            ctx.font = '13px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('選擇模式開始偵測節拍', w / 2, h / 2 + 4);
        }
        drawIdle();
    })();
    </script>
</body>
</html>
