<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BPM 節拍偵測器</title>
    <script src="https://cdn.jsdelivr.net/npm/essentia.js@0.1.3/dist/essentia-wasm.web.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/essentia.js@0.1.3/dist/essentia.js-core.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            padding: 1.5rem 1rem 0.5rem;
            text-align: center;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.05em;
        }

        header p {
            font-size: 0.85rem;
            color: #666;
            margin-top: 0.25rem;
        }

        .mode-switcher {
            display: flex;
            gap: 0;
            margin: 1rem auto;
            background: #1a1a24;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a3a;
            width: fit-content;
        }

        .mode-btn {
            padding: 0.6rem 1.4rem;
            border: none;
            background: transparent;
            color: #888;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .mode-btn.active {
            background: #2a2a4a;
            color: #fff;
        }

        /* BPM Display */
        .bpm-display {
            text-align: center;
            padding: 2rem 1rem;
            position: relative;
        }

        .bpm-ring {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 3px solid #2a2a3a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            transition: border-color 0.1s, box-shadow 0.1s;
            position: relative;
        }

        .bpm-ring.pulse {
            border-color: #6c5ce7;
            box-shadow: 0 0 30px rgba(108, 92, 231, 0.3);
        }

        .bpm-number {
            font-size: 4rem;
            font-weight: 700;
            color: #fff;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .bpm-label {
            font-size: 1rem;
            color: #888;
            margin-top: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .bpm-sub {
            font-size: 0.85rem;
            color: #555;
            margin-top: 1rem;
            text-align: center;
        }

        /* Canvas visualizer */
        .visualizer-container {
            width: 100%;
            max-width: 500px;
            padding: 0 1rem;
            margin: 0.5rem auto;
        }

        #visualizer {
            width: 100%;
            height: 100px;
            border-radius: 12px;
            background: #12121a;
        }

        /* Tap area */
        .tap-area {
            width: 100%;
            max-width: 500px;
            padding: 0 1rem;
            margin: 1rem auto;
            display: none;
        }

        .tap-area.active {
            display: block;
        }

        .tap-button {
            width: 100%;
            height: 180px;
            border-radius: 16px;
            border: 2px dashed #2a2a3a;
            background: #12121a;
            color: #888;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            user-select: none;
            -webkit-user-select: none;
        }

        .tap-button:active {
            background: #1a1a2e;
            border-color: #6c5ce7;
            transform: scale(0.98);
        }

        .tap-icon {
            font-size: 2rem;
            opacity: 0.5;
        }

        .tap-hint {
            font-size: 0.8rem;
            color: #555;
        }

        /* Mic area */
        .mic-area {
            width: 100%;
            max-width: 500px;
            padding: 0 1rem;
            margin: 1rem auto;
            text-align: center;
            display: none;
        }

        .mic-area.active {
            display: block;
        }

        .mic-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid #2a2a3a;
            background: #12121a;
            color: #888;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .mic-button.listening {
            border-color: #e74c3c;
            background: #1a1215;
            animation: mic-glow 1.5s ease-in-out infinite;
        }

        @keyframes mic-glow {
            0%, 100% { box-shadow: 0 0 10px rgba(231, 76, 60, 0.2); }
            50% { box-shadow: 0 0 25px rgba(231, 76, 60, 0.4); }
        }

        .mic-status {
            margin-top: 0.75rem;
            font-size: 0.85rem;
            color: #666;
        }

        .mic-detail {
            margin-top: 0.4rem;
            font-size: 0.7rem;
            color: #444;
            font-family: monospace;
            font-variant-numeric: tabular-nums;
        }

        /* Progress bar */
        .buffer-progress {
            width: 100%;
            max-width: 300px;
            height: 4px;
            background: #1a1a24;
            border-radius: 2px;
            margin: 0.75rem auto 0;
            overflow: hidden;
            display: none;
        }

        .buffer-progress.active {
            display: block;
        }

        .buffer-progress-bar {
            height: 100%;
            background: #6c5ce7;
            border-radius: 2px;
            transition: width 0.3s;
            width: 0%;
        }

        /* History */
        .history {
            width: 100%;
            max-width: 500px;
            padding: 1rem;
            margin-top: auto;
        }

        .history-title {
            font-size: 0.8rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .history-items {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .history-item {
            padding: 0.3rem 0.7rem;
            background: #1a1a24;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #aaa;
            font-variant-numeric: tabular-nums;
        }

        .reset-btn {
            display: inline-block;
            margin-top: 0.75rem;
            padding: 0.3rem 0.8rem;
            background: transparent;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            color: #666;
            font-size: 0.8rem;
            cursor: pointer;
            font-family: inherit;
        }

        .reset-btn:active {
            background: #1a1a24;
        }

        .back-link {
            display: inline-block;
            margin: 1.5rem 0;
            color: #555;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .back-link:hover {
            color: #888;
        }

        .engine-badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            background: #1a1a24;
            border: 1px solid #2a2a3a;
            border-radius: 6px;
            font-size: 0.7rem;
            color: #666;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>BPM 節拍偵測器</h1>
        <p>偵測音樂節拍速度</p>
        <span class="engine-badge">Powered by Essentia.js (WASM)</span>
    </header>

    <div class="mode-switcher">
        <button class="mode-btn active" data-mode="tap">手動 Tap</button>
        <button class="mode-btn" data-mode="mic">麥克風偵測</button>
    </div>

    <div class="bpm-display">
        <div class="bpm-ring" id="bpmRing">
            <span class="bpm-number" id="bpmNumber">—</span>
            <span class="bpm-label">BPM</span>
        </div>
        <div class="bpm-sub" id="bpmSub"></div>
    </div>

    <div class="visualizer-container">
        <canvas id="visualizer"></canvas>
    </div>

    <!-- Tap Mode -->
    <div class="tap-area active" id="tapArea">
        <button class="tap-button" id="tapButton">
            <span class="tap-icon">👆</span>
            <span>跟著節拍點擊</span>
            <span class="tap-hint">連續點擊至少 4 下</span>
        </button>
    </div>

    <!-- Mic Mode -->
    <div class="mic-area" id="micArea">
        <button class="mic-button" id="micButton">🎤</button>
        <div class="mic-status" id="micStatus">點擊開始偵測</div>
        <div class="buffer-progress" id="bufferProgress">
            <div class="buffer-progress-bar" id="bufferProgressBar"></div>
        </div>
        <div class="mic-detail" id="micDetail"></div>
    </div>

    <!-- History -->
    <div class="history" id="historySection" style="display:none;">
        <div class="history-title">偵測紀錄</div>
        <div class="history-items" id="historyItems"></div>
        <button class="reset-btn" id="resetBtn">清除紀錄</button>
    </div>

    <a href="../" class="back-link">← 返回首頁</a>

    <script>
    (() => {
        // --- Essentia.js ---
        let essentia = null;
        let essentiaReady = false;

        // Initialize essentia WASM
        EssentiaWASM().then(function(wasmModule) {
            essentia = new Essentia(wasmModule);
            essentiaReady = true;
            console.log('Essentia.js ready:', essentia.version);
        }).catch(function(err) {
            console.error('Failed to load Essentia.js:', err);
        });

        // --- State ---
        const state = {
            mode: 'tap',
            tapTimes: [],
            tapTimeout: null,
            bpm: 0,
            history: [],
            // Mic
            audioCtx: null,
            analyser: null,
            micStream: null,
            listening: false,
            scriptNode: null,
            // Audio buffer for essentia analysis
            audioBuffer: [],
            bufferDuration: 6, // seconds of audio to accumulate
            analysisInterval: 3, // re-analyze every N seconds
            lastAnalysisTime: 0,
            sampleRate: 44100,
            animFrameId: null,
        };

        // --- DOM ---
        const $ = (sel) => document.querySelector(sel);
        const bpmNumber = $('#bpmNumber');
        const bpmRing = $('#bpmRing');
        const bpmSub = $('#bpmSub');
        const tapArea = $('#tapArea');
        const tapButton = $('#tapButton');
        const micArea = $('#micArea');
        const micButton = $('#micButton');
        const micStatus = $('#micStatus');
        const micDetail = $('#micDetail');
        const bufferProgress = $('#bufferProgress');
        const bufferProgressBar = $('#bufferProgressBar');
        const historySection = $('#historySection');
        const historyItems = $('#historyItems');
        const resetBtn = $('#resetBtn');
        const canvas = $('#visualizer');
        const ctx = canvas.getContext('2d');

        // --- Canvas resize ---
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width * devicePixelRatio;
            canvas.height = 100 * devicePixelRatio;
            ctx.scale(devicePixelRatio, devicePixelRatio);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // --- Mode Switching ---
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.mode = btn.dataset.mode;

                tapArea.classList.toggle('active', state.mode === 'tap');
                micArea.classList.toggle('active', state.mode === 'mic');

                if (state.mode === 'tap' && state.listening) {
                    stopMic();
                }
            });
        });

        // --- Display ---
        function updateBpmDisplay(bpm, sub) {
            state.bpm = bpm;
            bpmNumber.textContent = bpm > 0 ? Math.round(bpm) : '—';
            bpmSub.textContent = sub || '';
            pulseRing();
        }

        function pulseRing() {
            bpmRing.classList.add('pulse');
            setTimeout(() => bpmRing.classList.remove('pulse'), 150);
        }

        function addHistory(bpm) {
            if (bpm <= 0) return;
            const rounded = Math.round(bpm);
            state.history.unshift(rounded);
            if (state.history.length > 10) state.history.pop();
            renderHistory();
        }

        function renderHistory() {
            if (state.history.length === 0) {
                historySection.style.display = 'none';
                return;
            }
            historySection.style.display = 'block';
            historyItems.innerHTML = state.history
                .map(b => `<span class="history-item">${b} BPM</span>`)
                .join('');
        }

        resetBtn.addEventListener('click', () => {
            state.history = [];
            state.tapTimes = [];
            updateBpmDisplay(0, '');
            renderHistory();
        });

        // =====================
        //     TAP TEMPO
        // =====================
        tapButton.addEventListener('click', onTap);
        tapButton.addEventListener('touchstart', (e) => {
            e.preventDefault();
            onTap();
        });

        function onTap() {
            const now = performance.now();

            if (state.tapTimes.length > 0 && now - state.tapTimes[state.tapTimes.length - 1] > 2000) {
                if (state.bpm > 0) addHistory(state.bpm);
                state.tapTimes = [];
            }

            state.tapTimes.push(now);
            if (state.tapTimes.length > 20) state.tapTimes.shift();

            pulseRing();
            drawTapVisual();

            if (state.tapTimes.length < 2) {
                updateBpmDisplay(0, '繼續點擊...');
                return;
            }

            const intervals = [];
            for (let i = 1; i < state.tapTimes.length; i++) {
                intervals.push(state.tapTimes[i] - state.tapTimes[i - 1]);
            }
            const avgInterval = intervals.reduce((a, b) => a + b, 0) / intervals.length;
            const bpm = 60000 / avgInterval;
            updateBpmDisplay(bpm, `${state.tapTimes.length} 次點擊`);

            clearTimeout(state.tapTimeout);
            state.tapTimeout = setTimeout(() => {
                if (state.bpm > 0) addHistory(state.bpm);
            }, 3000);
        }

        function drawTapVisual() {
            const w = canvas.width / devicePixelRatio;
            const h = canvas.height / devicePixelRatio;
            ctx.clearRect(0, 0, w, h);

            if (state.tapTimes.length < 2) return;

            const intervals = [];
            for (let i = 1; i < state.tapTimes.length; i++) {
                intervals.push(state.tapTimes[i] - state.tapTimes[i - 1]);
            }

            const maxInterval = Math.max(...intervals);
            const barWidth = Math.max(4, (w - 20) / intervals.length - 2);

            intervals.forEach((interval, i) => {
                const barHeight = (interval / maxInterval) * (h - 20);
                const x = 10 + i * (barWidth + 2);
                const y = h - 10 - barHeight;
                const hue = 260 - (interval / maxInterval) * 40;
                ctx.fillStyle = `hsla(${hue}, 60%, 60%, 0.8)`;
                ctx.beginPath();
                ctx.roundRect(x, y, barWidth, barHeight, 2);
                ctx.fill();
            });
        }

        // =====================
        //  MICROPHONE + ESSENTIA
        // =====================
        micButton.addEventListener('click', toggleMic);

        async function toggleMic() {
            if (state.listening) {
                stopMic();
            } else {
                await startMic();
            }
        }

        async function startMic() {
            if (!essentiaReady) {
                micStatus.textContent = 'Essentia.js 載入中，請稍候...';
                // Wait for essentia to be ready
                const waitStart = Date.now();
                while (!essentiaReady && Date.now() - waitStart < 10000) {
                    await new Promise(r => setTimeout(r, 200));
                }
                if (!essentiaReady) {
                    micStatus.textContent = 'Essentia.js 載入失敗';
                    return;
                }
            }

            try {
                state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                state.sampleRate = state.audioCtx.sampleRate;
                state.micStream = await navigator.mediaDevices.getUserMedia({ audio: true });

                const source = state.audioCtx.createMediaStreamSource(state.micStream);

                // Analyser for visualization
                state.analyser = state.audioCtx.createAnalyser();
                state.analyser.fftSize = 2048;
                state.analyser.smoothingTimeConstant = 0.3;
                source.connect(state.analyser);

                // ScriptProcessor to capture raw PCM samples for essentia
                const bufferSize = 4096;
                state.scriptNode = state.audioCtx.createScriptProcessor(bufferSize, 1, 1);
                state.scriptNode.onaudioprocess = onAudioProcess;
                source.connect(state.scriptNode);
                state.scriptNode.connect(state.audioCtx.destination); // required for it to work

                state.listening = true;
                state.audioBuffer = [];
                state.lastAnalysisTime = 0;

                micButton.classList.add('listening');
                micStatus.textContent = '收集音訊中...';
                bufferProgress.classList.add('active');
                bufferProgressBar.style.width = '0%';
                micDetail.textContent = '';

                drawVisualizerLoop();
            } catch (err) {
                micStatus.textContent = '無法存取麥克風';
                console.error(err);
            }
        }

        function onAudioProcess(e) {
            if (!state.listening) return;

            const input = e.inputBuffer.getChannelData(0);
            // Copy samples into our buffer
            const samples = new Float32Array(input);
            state.audioBuffer.push(samples);

            // Calculate total samples
            const totalSamples = state.audioBuffer.reduce((sum, buf) => sum + buf.length, 0);
            const totalSeconds = totalSamples / state.sampleRate;
            const targetSamples = state.bufferDuration * state.sampleRate;

            // Update progress bar
            const progress = Math.min(100, (totalSeconds / state.bufferDuration) * 100);
            bufferProgressBar.style.width = progress + '%';

            // Trim old samples if buffer is too long (keep last bufferDuration seconds)
            while (totalSamples > targetSamples * 1.5) {
                state.audioBuffer.shift();
            }

            // Run analysis when we have enough data
            const now = performance.now() / 1000;
            if (totalSeconds >= state.bufferDuration && now - state.lastAnalysisTime >= state.analysisInterval) {
                state.lastAnalysisTime = now;
                runEssentiaAnalysis();
            }
        }

        function runEssentiaAnalysis() {
            if (!essentiaReady || !essentia) return;

            try {
                // Merge buffer chunks into a single Float32Array
                const totalSamples = state.audioBuffer.reduce((sum, buf) => sum + buf.length, 0);
                const merged = new Float32Array(totalSamples);
                let offset = 0;
                for (const chunk of state.audioBuffer) {
                    merged.set(chunk, offset);
                    offset += chunk.length;
                }

                // Convert to essentia vector
                const signal = essentia.arrayToVector(merged);

                // Try PercivalBpmEstimator first (robust, returns just BPM)
                let bpm = 0;
                let method = '';

                try {
                    const result = essentia.PercivalBpmEstimator(signal);
                    bpm = result.bpm;
                    method = 'Percival';
                } catch (e1) {
                    console.warn('PercivalBpmEstimator failed:', e1);
                }

                // Fallback: try RhythmExtractor2013 if Percival fails or returns 0
                if (!bpm || bpm <= 0) {
                    try {
                        const result = essentia.RhythmExtractor2013(signal);
                        bpm = result.bpm;
                        method = 'RhythmExtractor';
                    } catch (e2) {
                        console.warn('RhythmExtractor2013 failed:', e2);
                    }
                }

                if (bpm && bpm > 30 && bpm < 300) {
                    const seconds = (totalSamples / state.sampleRate).toFixed(1);
                    updateBpmDisplay(bpm, `分析 ${seconds}s 音訊`);
                    micStatus.textContent = `偵測到 ${Math.round(bpm)} BPM`;
                    micDetail.textContent = `演算法: ${method} | 取樣率: ${state.sampleRate}Hz | 音訊長度: ${seconds}s`;
                    pulseRing();
                } else {
                    micStatus.textContent = '偵測中... 請確認音樂正在播放';
                    micDetail.textContent = bpm ? `原始值: ${bpm.toFixed(1)} (超出範圍)` : '尚未偵測到節拍';
                }
            } catch (err) {
                console.error('Essentia analysis error:', err);
                micDetail.textContent = '分析錯誤: ' + err.message;
            }
        }

        function stopMic() {
            state.listening = false;
            if (state.scriptNode) {
                state.scriptNode.disconnect();
                state.scriptNode = null;
            }
            if (state.micStream) {
                state.micStream.getTracks().forEach(t => t.stop());
                state.micStream = null;
            }
            if (state.audioCtx) {
                state.audioCtx.close();
                state.audioCtx = null;
            }
            if (state.animFrameId) {
                cancelAnimationFrame(state.animFrameId);
                state.animFrameId = null;
            }

            micButton.classList.remove('listening');
            micStatus.textContent = '點擊開始偵測';
            micDetail.textContent = '';
            bufferProgress.classList.remove('active');
            state.audioBuffer = [];

            if (state.bpm > 0) addHistory(state.bpm);
        }

        // --- Visualizer loop (separate from analysis) ---
        function drawVisualizerLoop() {
            if (!state.listening) return;

            const analyser = state.analyser;
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            analyser.getByteFrequencyData(dataArray);

            const w = canvas.width / devicePixelRatio;
            const h = canvas.height / devicePixelRatio;
            ctx.clearRect(0, 0, w, h);

            const barCount = 64;
            const step = Math.floor(bufferLength / barCount);
            const barWidth = (w - 20) / barCount - 1;

            for (let i = 0; i < barCount; i++) {
                const value = dataArray[i * step] / 255;
                const barHeight = value * (h - 20);
                const x = 10 + i * (barWidth + 1);
                const y = h - 10 - barHeight;

                const hue = 260 - (i / barCount) * 80;
                const lightness = 40 + value * 25;
                ctx.fillStyle = `hsla(${hue}, 60%, ${lightness}%, 0.85)`;
                ctx.beginPath();
                ctx.roundRect(x, y, barWidth, barHeight, 1);
                ctx.fill();
            }

            state.animFrameId = requestAnimationFrame(drawVisualizerLoop);
        }

        // --- Canvas roundRect polyfill ---
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                this.closePath();
            };
        }

        // Draw idle state
        function drawIdle() {
            const w = canvas.width / devicePixelRatio;
            const h = canvas.height / devicePixelRatio;
            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = '#333';
            ctx.font = '13px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('選擇模式開始偵測節拍', w / 2, h / 2 + 4);
        }
        drawIdle();
    })();
    </script>
</body>
</html>
