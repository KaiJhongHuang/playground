<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playground - 實驗專案集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f0f0f;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 3rem 2rem 2rem;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #ffffff;
        }

        header p {
            margin-top: 0.5rem;
            font-size: 1.1rem;
            color: #888;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            width: 100%;
            max-width: 1200px;
            padding: 2rem;
        }

        .project-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.2s, border-color 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .project-card:hover {
            transform: translateY(-4px);
            border-color: #555;
        }

        .project-card h2 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .project-card p {
            font-size: 0.9rem;
            color: #888;
            line-height: 1.5;
        }

        .project-card .tag {
            display: inline-block;
            margin-top: 0.75rem;
            padding: 0.2rem 0.6rem;
            font-size: 0.75rem;
            border-radius: 999px;
            background: #2a2a2a;
            color: #aaa;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #555;
            font-size: 1rem;
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            text-align: center;
            color: #444;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Playground</h1>
        <p>實驗性專案集合</p>
    </header>

    <main class="projects-grid">
        <a class="project-card" href="./beat-detector/">
            <h2>BPM 節拍偵測器</h2>
            <p>偵測音樂節拍速度，支援麥克風即時偵測與手動 Tap Tempo。</p>
            <span class="tag">Web Audio</span>
        </a>
        <a class="project-card" href="./daily-quest/">
            <h2>Daily Quest</h2>
            <p>以 75 Hard 為靈感的每日任務打卡系統，串接 Google Sheet。</p>
            <span class="tag">Google Apps Script</span>
        </a>
        <a class="project-card" href="./hero-growth/">
            <h2>Hero Growth — 英雄成長</h2>
            <p>RPG 化自我提升追蹤：完成健身/閱讀/冥想挑戰來升級六屬性，支援 Google Sheets 雲端同步。</p>
            <span class="tag">RPG · Gamification</span>
        </a>
    </main>

    <footer>
        <p>Playground &copy; 2026</p>
    </footer>
</body>
</html>
